# Deploy to default (free) GitHub project Pages: https://<owner>.github.io/<repo>/
# Leave Settings → Pages → Custom domain empty so traffic stays on github.io.
# This workflow never publishes a CNAME file in the artifact.
name: Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pages-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-site:
    name: Package site for Pages
    if: |
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y gcc make

      - name: Build all examples
        run: make all

      - name: Verify playground manifest
        run: python3 scripts/verify_playground_manifest.py

      - name: Assemble static site
        run: |
          mkdir -p _site
          cp playground.html _site/
          cp -r topics _site/
          cp site/index.html _site/index.html
          cp site/404.html _site/404.html
          touch _site/.nojekyll
          rm -f _site/CNAME

      - name: Default github.io URL (no custom domain)
        run: |
          OWNER="${{ github.repository_owner }}"
          REPO_LC=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          {
            echo "## Default GitHub Pages URL"
            echo "Published for **default** project Pages (leave Custom domain empty in repo Settings):"
            echo ""
            echo "- App: \`https://${OWNER}.github.io/${REPO_LC}/playground.html\`"
            echo "- Root: \`https://${OWNER}.github.io/${REPO_LC}/\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy to GitHub Pages
    if: |
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    needs: build-site
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

      - name: Default github.io URL (no custom domain)
        run: |
          OWNER="${{ github.repository_owner }}"
          REPO_LC=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          {
            echo "## Default GitHub Pages URL"
            echo "Use the **github.io** links below unless you configure a custom domain in Settings → Pages."
            echo ""
            echo "- \`https://${OWNER}.github.io/${REPO_LC}/playground.html\`"
            echo "- \`https://${OWNER}.github.io/${REPO_LC}/\`"
          } >> "$GITHUB_STEP_SUMMARY"
