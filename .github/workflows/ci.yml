# Fast checks for every push / PR (no GitHub Pages required).
# Live app: default project Pages only — see Pages workflow (github.io, no CNAME in artifact).
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    name: Verify C build & playground data
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y gcc make

      - name: Build all examples (gcc -Wall -Wextra -std=c11 -pedantic)
        run: make all

      - name: Verify playground MANIFEST paths & BAKED keys
        run: python3 scripts/verify_playground_manifest.py

      - name: Check playground.html size
        run: test -s playground.html && test "$(wc -c < playground.html)" -ge 2000

      - name: Default GitHub Pages URL (reference)
        if: github.event_name == 'push'
        run: |
          OWNER="${{ github.repository_owner }}"
          REPO_LC=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          {
            echo "## After merge to \`main\`"
            echo "The **Pages** workflow deploys to default **github.io** (leave Custom domain empty):"
            echo "- \`https://${OWNER}.github.io/${REPO_LC}/playground.html\`"
          } >> "$GITHUB_STEP_SUMMARY"
